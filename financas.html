<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F6E56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Minhas Finanças">

  <title>Minhas Finanças</title>
  
  <link rel="manifest" href="manifest.json">

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --brand:#1D9E75;--brand-dark:#0F6E56;--brand-light:#E1F5EE;
      --danger:#E24B4A;--warn:#EF9F27;--ok:#1D9E75;
      --surface:var(--color-background-primary);
      --surface2:var(--color-background-secondary);
      --border:var(--color-border-tertiary);
      --text:var(--color-text-primary);
      --muted:var(--color-text-secondary);
      --hint:var(--color-text-tertiary);
      --r-phone:24px;--r-card:16px;--r-pill:99px;
    }
    body{
      background:#f5f5f5;
      font-family:system-ui,-apple-system,sans-serif;
      height:100dvh;
      overflow:hidden;
      margin:0;
    }
    .phone{
      width:100%;
      max-width:360px;
      margin:0 auto;
      background:var(--surface2);
      height:100dvh;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      border-radius:0;
    }
    .statusbar{
      background:#0F6E56;
      padding:8px 20px 6px;
      display:flex;align-items:center;justify-content:space-between;
      color:#fff;
      font-size:13px;
      flex-shrink:0;
    }
    .statusbar-time{font-weight:500;}
    .statusbar-icons{display:flex;gap:6px;align-items:center;}
    .statusbar-icons i{font-size:14px;}

    .hero{
      background:#0F6E56;
      padding:0 20px 24px;
      flex-shrink:0;
    }
    .hero-greeting{font-size:13px;color:#9FE1CB;margin-bottom:2px;}
    .hero-name{font-size:20px;font-weight:500;color:#fff;margin-bottom:20px;}
    .hero-card{background:#1D9E75;border-radius:var(--r-card);padding:18px;}
    .hero-card-label{font-size:12px;color:#9FE1CB;margin-bottom:4px;}
    .hero-card-value{font-size:28px;font-weight:500;color:#fff;margin-bottom:16px;}
    .hero-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .hero-mini{background:rgba(255,255,255,0.12);border-radius:10px;padding:10px 12px;}
    .hero-mini-label{font-size:11px;color:#9FE1CB;margin-bottom:2px;}
    .hero-mini-value{font-size:15px;font-weight:500;color:#fff;}

    .scroller{overflow-x:auto;display:flex;gap:8px;padding:16px 20px 4px;scrollbar-width:none;flex-shrink:0;}
    .scroller::-webkit-scrollbar{display:none;}
    .chip{flex-shrink:0;padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;}
    .chip.active{background:#0F6E56;color:#fff;border-color:#0F6E56;}

    .content{
      flex:1;
      overflow-y:auto;
      background:var(--surface2);
    }

    .section{display:none;padding:0 16px 24px;}
    .section.show{display:block;}
    .sec-title{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 10px;}
    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-card);padding:14px 16px;margin-bottom:10px;}
    .row{display:flex;align-items:center;gap:12px;}
    .row-between{display:flex;align-items:center;justify-content:space-between;}
    .item-name{font-size:14px;font-weight:500;color:var(--text);}
    .item-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .amount{font-size:15px;font-weight:500;}
    .pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:var(--r-pill);}
    .pill-danger{background:#FCEBEB;color:#A32D2D;}
    .pill-warn{background:#FAEEDA;color:#633806;}
    .pill-ok{background:#E1F5EE;color:#085041;}
    .pill-info{background:#E6F1FB;color:#0C447C;}
    .done-circle{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
    .done-circle.yes{background:#1D9E75;border-color:#1D9E75;}
    .done-circle.yes i{font-size:12px;color:#fff;}
    .del-btn{background:none;border:none;cursor:pointer;color:var(--hint);padding:4px;display:flex;align-items:center;font-size:16px;}
    .del-btn:hover{color:var(--danger);}
    .progress-bg{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:8px 0 4px;}
    .progress-fill{height:100%;border-radius:99px;}
    .pf-teal{background:#1D9E75;}
    .pf-blue{background:#378ADD;}
    .pf-amber{background:#EF9F27;}
    .pf-coral{background:#D85A30;}
    .goal-footer{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
    .form-sheet{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-card);padding:16px;margin-bottom:16px;}
    .form-sheet input, .form-sheet select{width:100%;margin-bottom:10px;font-size:14px;padding:12px;border:0.5px solid var(--border);border-radius:8px;}
    .form-sheet button{width:100%;background:#0F6E56;color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:500;cursor:pointer;}
    .fab{display:flex;align-items:center;justify-content:center;gap:6px;background:#0F6E56;color:#fff;border:none;border-radius:var(--r-pill);padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:14px;}
    .toggle-form{display:none;}
    .toggle-form.open{display:block;}
    .lc-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
    .lc-row:last-child{border-bottom:none;}
    .lc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .lc-info{flex:1;min-width:0;}
    .lc-desc{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .lc-date{font-size:11px;color:var(--muted);}
    .navbar{display:flex;border-top:0.5px solid var(--border);background:var(--surface);flex-shrink:0;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 12px;cursor:pointer;border:none;background:none;font-size:11px;color:var(--muted);gap:3px;}
    .nav-btn i{font-size:22px;}
    .nav-btn.active{color:#0F6E56;}
    .empty-state{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;}
    .empty-state i{font-size:32px;margin-bottom:8px;display:block;color:var(--hint);}
    .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
    .sum-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-card);padding:12px 14px;}
    .sum-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
    .sum-value{font-size:17px;font-weight:500;color:var(--text);}
    .bar-row{margin-bottom:12px;}
    .bar-label-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  </style>
</head>
<body>

<div class="phone">

  <div class="statusbar">
    <span class="statusbar-time" id="sb-time">10:44</span>
    <div class="statusbar-icons">
      <i class="ti ti-wifi" aria-hidden="true"></i>
      <i class="ti ti-battery-2" aria-hidden="true"></i>
    </div>
  </div>

  <div class="hero">
    <p class="hero-greeting">Olá,</p>
    <p class="hero-name">Minhas Finanças</p>
    <div class="hero-card">
      <p class="hero-card-label">Saldo disponível</p>
      <p class="hero-card-value" id="hero-saldo">R$ 0,00</p>
      <div class="hero-row">
        <div class="hero-mini">
          <p class="hero-mini-label">Receitas</p>
          <p class="hero-mini-value" id="hero-rec">R$ 0</p>
        </div>
        <div class="hero-mini">
          <p class="hero-mini-label">Despesas</p>
          <p class="hero-mini-value" id="hero-desp">R$ 0</p>
        </div>
      </div>
    </div>
  </div>

  <div class="scroller" id="chips-bar">
    <div class="chip active" onclick="nav('contas',this)"><i class="ti ti-file-invoice" aria-hidden="true"></i> Contas</div>
    <div class="chip" onclick="nav('metas',this)"><i class="ti ti-target" aria-hidden="true"></i> Metas</div>
    <div class="chip" onclick="nav('lanc',this)"><i class="ti ti-arrows-exchange" aria-hidden="true"></i> Lançamentos</div>
    <div class="chip" onclick="nav('resumo',this)"><i class="ti ti-chart-bar" aria-hidden="true"></i> Resumo</div>
  </div>

  <div class="content">
    <!-- Conteúdo das abas -->
    <div class="section show" id="sec-contas">
      <div class="sum-grid" style="margin-top:16px;">
        <div class="sum-card"><div class="sum-label">Em aberto</div><div class="sum-value" style="color:#E24B4A;" id="cnt-aberto">R$ 0</div></div>
        <div class="sum-card"><div class="sum-label">Pagas</div><div class="sum-value" style="color:#1D9E75;" id="cnt-pago">R$ 0</div></div>
      </div>

      <button class="fab" onclick="toggleForm('form-conta')">
        <i class="ti ti-plus" aria-hidden="true"></i> Nova conta
      </button>

      <div class="toggle-form form-sheet" id="form-conta">
        <input type="text" id="c-nome" placeholder="Nome da conta" />
        <input type="number" id="c-valor" placeholder="Valor (R$)" />
        <input type="date" id="c-venc" />
        <button onclick="addConta()">Adicionar conta</button>
      </div>

      <p class="sec-title">Contas cadastradas</p>
      <div id="list-contas"><div class="empty-state"><i class="ti ti-file-off" aria-hidden="true"></i>Nenhuma conta ainda</div></div>
    </div>

    <!-- Outras abas (metas, lançamentos, resumo) -->
    <div class="section" id="sec-metas"> ... (mesmo conteúdo de antes) </div>
    <div class="section" id="sec-lanc"> ... </div>
    <div class="section" id="sec-resumo"> ... </div>
  </div>

  <nav class="navbar">
    <button class="nav-btn active" id="nb-contas" onclick="nav('contas',null,this)"><i class="ti ti-file-invoice" aria-hidden="true"></i><span>Contas</span></button>
    <button class="nav-btn" id="nb-metas" onclick="nav('metas',null,this)"><i class="ti ti-target" aria-hidden="true"></i><span>Metas</span></button>
    <button class="nav-btn" id="nb-lanc" onclick="nav('lanc',null,this)"><i class="ti ti-arrows-exchange" aria-hidden="true"></i><span>Lançamentos</span></button>
    <button class="nav-btn" id="nb-resumo" onclick="nav('resumo',null,this)"><i class="ti ti-chart-bar" aria-hidden="true"></i><span>Resumo</span></button>
  </nav>
</div>

<script>
  // Todo o JavaScript (mesmo do anterior)
  let C=[], M=[], L=[];
  try{C=JSON.parse(localStorage.getItem('af_c')||'[]');}catch(e){}
  try{M=JSON.parse(localStorage.getItem('af_m')||'[]');}catch(e){}
  try{L=JSON.parse(localStorage.getItem('af_l')||'[]');}catch(e){}

  const COLORS=['teal','blue','amber','coral'];

  function save(){ try{localStorage.setItem('af_c',JSON.stringify(C));localStorage.setItem('af_m',JSON.stringify(M));localStorage.setItem('af_l',JSON.stringify(L));}catch(e){} }

  function fmt(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function fmtS(v){return 'R$ '+Math.round(v).toLocaleString('pt-BR');}
  function today(){return new Date().toISOString().split('T')[0];}
  function diffDays(d){return Math.round((new Date(d+'T12:00:00')-new Date(today()+'T12:00:00'))/86400000);}

  function pill(d){
    if(!d)return'';
    const n=diffDays(d);
    if(n<0)return'<span class="pill pill-danger"><i class="ti ti-alert-circle" aria-hidden="true" style="font-size:11px;"></i>Vencida</span>';
    if(n===0)return'<span class="pill pill-warn">Hoje</span>';
    if(n<=3)return'<span class="pill pill-warn">'+n+'d</span>';
    return'<span class="pill pill-info">'+n+'d</span>';
  }

  function toggleForm(id){ document.getElementById(id).classList.toggle('open'); }

  function nav(page, chip, nb){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
    document.getElementById('sec-'+page).classList.add('show');
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    if(chip) chip.classList.add('active');
    const nbEl=document.getElementById('nb-'+page);
    if(nbEl) nbEl.classList.add('active');
    render();
  }

  // ... (as demais funções addConta, addMeta, etc. permanecem iguais - use o JS completo da versão anterior)

  function render(){
    // ... (mesmo render da versão anterior)
    const now=new Date();
    const h=now.getHours().toString().padStart(2,'0');
    const min=now.getMinutes().toString().padStart(2,'0');
    document.getElementById('sb-time').textContent=h+':'+min;
  }

  render();
</script>
</body>
</html>
