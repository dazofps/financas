<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F6E56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanças">
  
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("PWA: Ativo"))
        .catch(err => console.log("PWA: Erro", err));
    }
  </script>

  <title>Minhas Finanças</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230F6E56'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='white'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">

  <style>
    *{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
    :root{
      --brand:#1D9E75;--brand-dark:#0F6E56;--brand-light:#E1F5EE;
      --danger:#E24B4A;--warn:#EF9F27;--ok:#1D9E75;
      --surface:#ffffff;
      --surface2:#f8f9fa;
      --border:#e0e0e0;
      --text:#212121;
      --muted:#666666;
      --hint:#999999;
      --r-card:16px;--r-pill:99px;
    }
    
    html, body {
      background:#0F6E56;
      font-family:system-ui,-apple-system,sans-serif;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .phone{
      width:100%;
      max-width:360px;
      margin:0 auto;
      background:var(--surface2);
      height: 100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .hero{
      background:#0F6E56;
      padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 24px;
      position:relative;
      flex-shrink:0;
    }
    
    .main-content{
      flex:1;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:30px;
    }
    
    .hero-greeting{font-size:13px;color:#9FE1CB;margin-bottom:2px;}
    .hero-name{font-size:20px;font-weight:500;color:#fff;margin-bottom:20px;}
    
    .settings-btn{
      position:absolute;
      top: calc(20px + env(safe-area-inset-top, 0px));
      right:20px;
      background:none;
      border:none;
      font-size:24px;
      color:#fff;
      opacity:0.85;
      z-index:10;
    }

    .hero-card{background:#1D9E75;border-radius:var(--r-card);padding:18px;}
    .hero-card-label{font-size:12px;color:#9FE1CB;margin-bottom:4px;}
    .hero-card-value{font-size:28px;font-weight:500;color:#fff;margin-bottom:16px;}
    .hero-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .hero-mini{background:rgba(255,255,255,0.12);border-radius:10px;padding:10px 12px;}
    .hero-mini-label{font-size:11px;color:#9FE1CB;margin-bottom:2px;}
    .hero-mini-value{font-size:15px;font-weight:500;color:#fff;}

    .scroller{overflow-x:auto;display:flex;gap:8px;padding:16px 20px 4px;scrollbar-width:none;}
    .scroller::-webkit-scrollbar{display:none;}
    .chip{flex-shrink:0;padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px;}
    .chip.active{background:#0F6E56;color:#fff;border-color:#0F6E56;}
    
    .section{display:none;padding:0 16px 16px;}
    .section.show{display:block;}
    .sec-title{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 10px;}
    
    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-card);padding:14px 16px;margin-bottom:10px;}
    .row-between{display:flex;align-items:center;justify-content:space-between;}
    .item-name{font-size:14px;font-weight:500;color:var(--text);}
    .item-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .amount{font-size:15px;font-weight:500;}
    
    .done-circle{
      width:28px; height:28px; border-radius:50%; border:2px solid var(--border);
      background:var(--surface); display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0;
    }
    .done-circle.yes{background:#1D9E75; border-color:#1D9E75;}
    .done-circle.yes i{font-size:16px;color:#fff;}

    .del-btn{background:none; border:none; color:#E24B4A; font-size:20px; cursor:pointer; padding:4px 8px;}

    .progress-bg{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:8px 0 4px;}
    .progress-fill{height:100%;border-radius:99px;}
    .pf-teal{background:#1D9E75;}
    .pf-blue{background:#378ADD;}
    .pf-amber{background:#EF9F27;}
    .pf-coral{background:#D85A30;}
    
    .form-sheet{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-card);padding:16px;margin-bottom:16px;}
    .form-sheet input, .form-sheet select{width:100%;margin-bottom:10px;font-size:14px;padding:12px;border:0.5px solid var(--border);border-radius:8px;}
    .form-sheet button{width:100%;background:#0F6E56;color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:500;cursor:pointer;}
    .fab{display:flex;align-items:center;justify-content:center;gap:6px;background:#0F6E56;color:#fff;border:none;border-radius:var(--r-pill);padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-bottom:14px;}
    
    .toggle-form{display:none;}
    .toggle-form.open{display:block;}

    .lc-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
    .lc-info{flex:1;min-width:0;}
    .lc-desc{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    
    .navbar{
      display:flex;
      border-top:0.5px solid var(--border);
      background:var(--surface);
      flex-shrink:0;
      padding-top: 8px;
      padding-bottom: calc(15px + env(safe-area-inset-bottom, 0px));
    }
    .nav-btn{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:8px 4px;
      cursor:pointer;
      border:none;
      background:none;
      color:var(--muted);
      gap:4px;
    }
    .nav-btn i{font-size:26px;}
    .nav-btn.active{color:#0F6E56;}

    .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
    .sum-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-card);padding:12px 14px;}
    .sum-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
    .sum-value{font-size:17px;font-weight:500;color:var(--text);}
    
    .empty-state{text-align:center;padding:24px 16px;color:var(--muted);font-size:13px;}
    .empty-state i{font-size:32px;margin-bottom:8px;display:block;color:var(--hint);}
  </style>
</head>
<body>

<div class="phone">
  <div class="hero">
    <button class="settings-btn" onclick="editUserName()">✏️</button>
    <p class="hero-greeting">Olá,</p>
    <p class="hero-name" id="user-name">Caro Cliente</p>
    <div class="hero-card">
      <p class="hero-card-label">Saldo disponível</p>
      <p class="hero-card-value" id="hero-saldo">R$ 0,00</p>
      <div class="hero-row">
        <div class="hero-mini">
          <p class="hero-mini-label">Receitas</p>
          <p class="hero-mini-value" id="hero-rec">R$ 0</p>
        </div>
        <div class="hero-mini">
          <p class="hero-mini-label">Despesas</p>
          <p class="hero-mini-value" id="hero-desp">R$ 0</p>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <!-- ORDEM ALTERADA NOS CHIPS -->
    <div class="scroller" id="chips-bar">
      <div class="chip active" onclick="nav('resumo',this)"><i class="ti ti-chart-bar"></i> Resumo</div>
      <div class="chip" onclick="nav('contas',this)"><i class="ti ti-file-invoice"></i> Contas</div>
      <div class="chip" onclick="nav('metas',this)"><i class="ti ti-target"></i> Metas</div>
      <div class="chip" onclick="nav('lanc',this)"><i class="ti ti-arrows-exchange"></i> Lançamentos</div>
    </div>

    <!-- 1. RESUMO AGORA É O PRIMEIRO -->
    <div class="section show" id="sec-resumo">
      <div style="height:16px;"></div>
      <div class="sum-grid">
        <div class="sum-card"><div class="sum-label">Saldo Real</div><div class="sum-value" id="r-saldo">R$ 0</div></div>
        <div class="sum-card"><div class="sum-label">Contas abertas</div><div class="sum-value" style="color:#E24B4A;" id="r-contas">R$ 0</div></div>
        <div class="sum-card"><div class="sum-label">Guardado</div><div class="sum-value" style="color:#1D9E75;" id="r-metas">R$ 0</div></div>
      </div>
      <p class="sec-title">Status do Mês</p>
      <div class="card" id="r-bars"></div>
    </div>

    <!-- 2. CONTAS -->
    <div class="section" id="sec-contas">
      <div class="sum-grid" style="margin-top:16px;">
        <div class="sum-card"><div class="sum-label">Em aberto</div><div class="sum-value" style="color:#E24B4A;" id="cnt-aberto">R$ 0</div></div>
        <div class="sum-card"><div class="sum-label">Pagas</div><div class="sum-value" style="color:#1D9E75;" id="cnt-pago">R$ 0</div></div>
      </div>
      <button class="fab" onclick="toggleForm('form-conta')">
        <i class="ti ti-plus"></i> Nova conta
      </button>
      <div class="toggle-form form-sheet" id="form-conta">
        <input type="text" id="c-nome" placeholder="Nome da conta" />
        <input type="number" id="c-valor" placeholder="Valor (R$)" />
        <input type="date" id="c-venc" />
        <button onclick="addConta()">Adicionar conta</button>
      </div>
      <p class="sec-title">Minhas Contas</p>
      <div id="list-contas"></div>
    </div>

    <!-- 3. METAS -->
    <div class="section" id="sec-metas">
      <div style="height:16px;"></div>
      <button class="fab" onclick="toggleForm('form-meta')">
        <i class="ti ti-plus"></i> Nova meta
      </button>
      <div class="toggle-form form-sheet" id="form-meta">
        <input type="text" id="m-nome" placeholder="Ex: Viagem, Carro..." />
        <input type="number" id="m-total" placeholder="Meta final (R$)" />
        <input type="number" id="m-atual" placeholder="Já tenho (R$)" />
        <button onclick="addMeta()">Criar meta</button>
      </div>
      <p class="sec-title">Objetivos</p>
      <div id="list-metas"></div>
    </div>

    <!-- 4. LANÇAMENTOS -->
    <div class="section" id="sec-lanc">
      <div style="height:16px;"></div>
      <button class="fab" onclick="toggleForm('form-lanc')">
        <i class="ti ti-plus"></i> Novo lançamento
      </button>
      <div class="toggle-form form-sheet" id="form-lanc">
        <select id="l-tipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
        <input type="text" id="l-desc" placeholder="Descrição" />
        <input type="number" id="l-valor" placeholder="Valor (R$)" />
        <button onclick="addLanc()">Lançar</button>
      </div>
      <p class="sec-title">Histórico recente</p>
      <div class="card" id="list-lanc-wrap"></div>
    </div>
  </div>

  <!-- NAVBAR COM ORDEM ALTERADA -->
  <nav class="navbar">
    <button class="nav-btn active" id="nb-resumo" onclick="nav('resumo',null,this)">
      <i class="ti ti-chart-bar"></i>
    </button>
    <button class="nav-btn" id="nb-contas" onclick="nav('contas',null,this)">
      <i class="ti ti-file-invoice"></i>
    </button>
    <button class="nav-btn" id="nb-metas" onclick="nav('metas',null,this)">
      <i class="ti ti-target"></i>
    </button>
    <button class="nav-btn" id="nb-lanc" onclick="nav('lanc',null,this)">
      <i class="ti ti-arrows-exchange"></i>
    </button>
  </nav>
</div>

<script>
let C=[], M=[], L=[];
let userName = "Caro Cliente";

try{
  C=JSON.parse(localStorage.getItem('af_c')||'[]');
  M=JSON.parse(localStorage.getItem('af_m')||'[]');
  L=JSON.parse(localStorage.getItem('af_l')||'[]');
  userName = localStorage.getItem('af_userName') || "Caro Cliente";
}catch(e){}

const COLORS=['teal','blue','amber','coral'];

function save(){
  localStorage.setItem('af_c',JSON.stringify(C));
  localStorage.setItem('af_m',JSON.stringify(M));
  localStorage.setItem('af_l',JSON.stringify(L));
  localStorage.setItem('af_userName', userName);
}

function fmt(v){return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtS(v){return 'R$ '+Math.round(v).toLocaleString('pt-BR');}
function today(){return new Date().toISOString().split('T')[0];}

function editUserName(){
  const n = prompt("Seu nome:", userName);
  if(n) { userName = n; save(); render(); }
}

function toggleForm(id){ document.getElementById(id).classList.toggle('open'); }

function nav(page, chip, nb){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
  const target = document.getElementById('sec-'+page);
  if(target) target.classList.add('show');
  
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  
  if(chip) chip.classList.add('active');
  const navBtn = document.getElementById('nb-'+page);
  if(navBtn) navBtn.classList.add('active');
  
  render();
}

function addConta(){
  const n=document.getElementById('c-nome').value, v=parseFloat(document.getElementById('c-valor').value), d=document.getElementById('c-venc').value;
  if(!n||!v) return;
  C.push({id:Date.now(),nome:n,valor:v,venc:d,pago:false});
  save(); render(); toggleForm('form-conta');
  document.getElementById('c-nome').value=''; document.getElementById('c-valor').value='';
}

function togglePago(id){
  const c=C.find(x=>x.id===id);
  if(c){
    c.pago=!c.pago;
    if(c.pago){
      c.linkedLancId = Date.now();
      L.unshift({id: c.linkedLancId, tipo: 'despesa', desc: `Pagamento: ${c.nome}`, valor: c.valor, data: today()});
    } else if(c.linkedLancId){
      L = L.filter(l => l.id !== c.linkedLancId);
      delete c.linkedLancId;
    }
    save(); render();
  }
}

function delConta(id){
  if(confirm('Excluir?')){
    const c=C.find(x=>x.id===id);
    if(c && c.linkedLancId) L = L.filter(l => l.id !== c.linkedLancId);
    C=C.filter(x=>x.id!==id); save(); render();
  }
}

function addMeta(){
  const n=document.getElementById('m-nome').value, t=parseFloat(document.getElementById('m-total').value), a=parseFloat(document.getElementById('m-atual').value)||0;
  if(!n||!t) return;
  M.push({id:Date.now(),nome:n,total:t,atual:a,color:COLORS[M.length%4]});
  save(); render(); toggleForm('form-meta');
}

function addToMeta(id){
  const inp=document.getElementById('mi-'+id), v=parseFloat(inp.value);
  const m=M.find(x=>x.id===id);
  if(m && v>0){
    m.atual=Math.min(m.total, m.atual+v);
    L.unshift({id:Date.now(), tipo:'despesa', desc:`Reserva: ${m.nome}`, valor:v, data:today()});
    save(); render();
  }
}

function delMeta(id){ if(confirm('Excluir?')){M=M.filter(x=>x.id!==id); save(); render();} }

function addLanc(){
  const t=document.getElementById('l-tipo').value, d=document.getElementById('l-desc').value, v=parseFloat(document.getElementById('l-valor').value);
  if(!d||!v) return;
  L.unshift({id:Date.now(),tipo:t,desc:d,valor:v,data:today()});
  save(); render(); toggleForm('form-lanc');
}

function delLanc(id){ if(confirm('Excluir?')){L=L.filter(x=>x.id!==id); save(); render();} }

function render(){
  const rec=L.filter(l=>l.tipo==='receita').reduce((s,l)=>s+l.valor,0);
  const desp=L.filter(l=>l.tipo==='despesa').reduce((s,l)=>s+l.valor,0);
  const saldo=rec-desp, aberto=C.filter(c=>!c.pago).reduce((s,c)=>s+c.valor,0), pago=C.filter(c=>c.pago).reduce((s,c)=>s+c.valor,0);

  document.getElementById('hero-saldo').textContent=fmt(saldo);
  document.getElementById('hero-rec').textContent=fmtS(rec);
  document.getElementById('hero-desp').textContent=fmtS(desp);
  document.getElementById('user-name').textContent = userName;

  const cntA = document.getElementById('cnt-aberto');
  if(cntA) cntA.textContent=fmt(aberto);
  const cntP = document.getElementById('cnt-pago');
  if(cntP) cntP.textContent=fmt(pago);

  const lc=document.getElementById('list-contas');
  if(lc) {
    lc.innerHTML = C.length ? C.sort((a,b)=>a.pago-b.pago).map(c=>`
      <div class="card" style="${c.pago?'opacity:.6':''}">
        <div class="row-between">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="done-circle ${c.pago?'yes':''}" onclick="togglePago(${c.id})">${c.pago?'<i class="ti ti-check"></i>':''}</div>
            <div><div class="item-name">${c.nome}</div><div class="item-sub">${c.venc||'Sem data'}</div></div>
          </div>
          <div style="text-align:right;">
            <div class="amount">${fmt(c.valor)}</div>
            <button class="del-btn" onclick="delConta(${c.id})">✕</button>
          </div>
        </div>
      </div>`).join('') : '<div class="empty-state">Nenhuma conta cadastrada</div>';
  }

  const lm=document.getElementById('list-metas');
  if(lm) {
    lm.innerHTML = M.length ? M.map(m=>`
      <div class="card">
        <div class="row-between"><b>${m.nome}</b> <button class="del-btn" onclick="delMeta(${m.id})">✕</button></div>
        <div class="progress-bg"><div class="progress-fill pf-${m.color}" style="width:${(m.atual/m.total)*100}%"></div></div>
        <div class="row-between" style="font-size:12px;"><span>${fmt(m.atual)}</span><span>${fmt(m.total)}</span></div>
        ${m.atual < m.total ? `<div style="display:flex;gap:5px;margin-top:10px;"><input id="mi-${m.id}" type="number" placeholder="R$"/><button onclick="addToMeta(${m.id})" style="background:#0F6E56;color:#fff;border:none;padding:5px 10px;border-radius:5px;">+</button></div>` : ''}
      </div>`).join('') : '<div class="empty-state">Sem metas no momento</div>';
  }

  const ll=document.getElementById('list-lanc-wrap');
  if(ll) {
    ll.innerHTML = L.length ? L.slice(0,20).map(l=>`
      <div class="lc-row">
        <div class="lc-info"><b>${l.desc}</b><br><small>${l.data}</small></div>
        <div style="color:${l.tipo==='receita'?'#1D9E75':'#E24B4A'}">${l.tipo==='receita'?'+':'-'}${fmt(l.valor)}</div>
        <button class="del-btn" onclick="delLanc(${l.id})">✕</button>
      </div>`).join('') : '<div class="empty-state">Sem lançamentos</div>';
  }

  if(document.getElementById('r-saldo')){
    document.getElementById('r-saldo').textContent=fmt(saldo);
    document.getElementById('r-contas').textContent=fmt(aberto);
    document.getElementById('r-metas').textContent=fmt(M.reduce((s,m)=>s+m.atual,0));
    
    // Barras de progresso no Resumo
    const totalFl = (rec + desp + pago) || 1;
    const rBars = document.getElementById('r-bars');
    if(rBars) {
      rBars.innerHTML = `
        <div style="margin-bottom:15px">
          <div class="row-between" style="font-size:12px; margin-bottom:5px"><span>Receitas</span><span>${fmt(rec)}</span></div>
          <div class="progress-bg"><div class="progress-fill pf-teal" style="width:${(rec/totalFl)*100}%"></div></div>
        </div>
        <div style="margin-bottom:15px">
          <div class="row-between" style="font-size:12px; margin-bottom:5px"><span>Despesas (Extras)</span><span>${fmt(desp)}</span></div>
          <div class="progress-bg"><div class="progress-fill pf-coral" style="width:${(desp/totalFl)*100}%"></div></div>
        </div>
        <div>
          <div class="row-between" style="font-size:12px; margin-bottom:5px"><span>Contas Pagas</span><span>${fmt(pago)}</span></div>
          <div class="progress-bg"><div class="progress-fill pf-blue" style="width:${(pago/totalFl)*100}%"></div></div>
        </div>
      `;
    }
  }
}
render();
</script>
</body>
</html>
